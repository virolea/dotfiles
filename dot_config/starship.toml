format = """
$directory\
$git_branch\
$git_state\
$git_status\
$ruby\
$nodejs\
$docker_context\
$cmd_duration\
$line_break\
$character"""

[username]
show_always = false

[hostname]
ssh_only = true
style = "bold yellow"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "$"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[ruby]
format = "via [$symbol($version )]($style)"
symbol = "💎 "
detect_files = ["Gemfile", ".ruby-version"]

[nodejs]
format = "via [$symbol($version )]($style)"
detect_files = ["package.json"]

[docker_context]
format = "via [$symbol$context]($style) "
only_with_files = true

[cmd_duration]
min_time = 2000
format = "took [$duration](yellow) "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[gcloud]
disabled = true

[aws]
disabled = true

[azure]
disabled = true

[package]
disabled = true
